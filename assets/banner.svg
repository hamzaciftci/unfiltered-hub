<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="UnfilteredHub — Self-hosted DNS-over-HTTPS on Cloudflare Workers">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0f1e"/>
      <stop offset="0.55" stop-color="#0d1730"/>
      <stop offset="1" stop-color="#101f3c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3a5f"/>
      <stop offset="1" stop-color="#16273f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#1c2a4a" stroke-width="1" fill="none" opacity="0.35"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="16" fill="url(#grid)"/>

  <!-- Decorative glow behind shield -->
  <circle cx="180" cy="160" r="150" fill="url(#glow)"/>

  <!-- Decorative network dots (right side) -->
  <g stroke="#2b3f66" stroke-width="1.2">
    <line x1="960" y1="70" x2="1060" y2="120"/>
    <line x1="1060" y1="120" x2="1010" y2="215"/>
    <line x1="1060" y1="120" x2="1150" y2="90"/>
    <line x1="1010" y1="215" x2="1120" y2="250"/>
    <line x1="960" y1="70" x2="1040" y2="30"/>
  </g>
  <g fill="#38bdf8">
    <circle cx="960" cy="70" r="4" opacity="0.9"/>
    <circle cx="1060" cy="120" r="5" opacity="0.7"/>
    <circle cx="1010" cy="215" r="4" opacity="0.55"/>
    <circle cx="1150" cy="90" r="3.5" opacity="0.5"/>
    <circle cx="1120" cy="250" r="3" opacity="0.45"/>
    <circle cx="1040" cy="30" r="3" opacity="0.5"/>
  </g>

  <!-- Shield -->
  <g transform="translate(110, 78)">
    <path d="M70 0 L140 26 V88 C140 132 110 158 70 172 C30 158 0 132 0 88 V26 Z"
          fill="url(#shieldFill)" stroke="url(#accent)" stroke-width="3"/>
    <!-- Lock body -->
    <rect x="46" y="76" width="48" height="40" rx="8" fill="url(#accent)"/>
    <!-- Lock shackle -->
    <path d="M54 76 V62 C54 51 61 44 70 44 C79 44 86 51 86 62 V76"
          stroke="url(#accent)" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="70" cy="92" r="6" fill="#0d1730"/>
    <rect x="67" y="94" width="6" height="12" rx="3" fill="#0d1730"/>
  </g>

  <!-- Title block -->
  <g font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
    <text x="310" y="128" font-size="58" font-weight="800" fill="#f1f5f9" letter-spacing="-1">
      Unfiltered<tspan fill="url(#accent)">Hub</tspan>
    </text>
    <text x="312" y="172" font-size="21" fill="#94a3b8" letter-spacing="0.2">
      Self-hosted DNS-over-HTTPS on Cloudflare Workers
    </text>

    <!-- Feature chips -->
    <g font-size="15" font-weight="600">
      <rect x="310" y="204" width="152" height="36" rx="18" fill="#0f2136" stroke="#1e3a5f"/>
      <text x="386" y="227" text-anchor="middle" fill="#7dd3fc">🔒 Encrypted DNS</text>

      <rect x="474" y="204" width="140" height="36" rx="18" fill="#0f2136" stroke="#1e3a5f"/>
      <text x="544" y="227" text-anchor="middle" fill="#7dd3fc">🛡 Ad Blocking</text>

      <rect x="626" y="204" width="132" height="36" rx="18" fill="#0f2136" stroke="#1e3a5f"/>
      <text x="692" y="227" text-anchor="middle" fill="#7dd3fc">⚡ Edge Cache</text>

      <rect x="770" y="204" width="130" height="36" rx="18" fill="#0f2136" stroke="#1e3a5f"/>
      <text x="835" y="227" text-anchor="middle" fill="#7dd3fc">☁ Free Tier</text>
    </g>

    <!-- RFC tag -->
    <text x="312" y="278" font-size="14" fill="#475569" letter-spacing="1.5">
      RFC 8484 · CLOUDFLARE · GOOGLE · QUAD9 · ZERO QUERY LOGS
    </text>
  </g>
</svg>
